[loggers]
keys=root,uvicorn

[handlers]
keys=console,file

[formatters]
keys=simple

[logger_root]
level=INFO
handlers=console,file

[logger_uvicorn]
level=INFO
handlers=console,file
qualname=uvicorn
propagate=0

[handler_console]
class=StreamHandler
level=INFO
formatter=simple
args=(sys.stdout,)

[handler_file]
class=logging.FileHandler
level=INFO
formatter=simple
args=('server.log', 'a')

[formatter_simple]
format=%(asctime)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S