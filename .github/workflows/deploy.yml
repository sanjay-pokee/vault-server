# =============================================================================
# Deploy Pipeline — vault-server (Python / FastAPI)
# =============================================================================
# WHAT THIS DOES:
#   Triggered on push to 'main' (after CI passes)
#   1. Builds a Docker image
#   2. Pushes it to GitHub Container Registry (ghcr.io)
#   3. The image can then be pulled and deployed anywhere
#
# AFTER THIS RUNS:
#   Your Docker image will be available at:
#   ghcr.io/keerthisreej/vault-server:latest
#
#   To deploy on any server:
#   docker pull ghcr.io/keerthisreej/vault-server:latest
#   docker run -p 8000:8000 ghcr.io/keerthisreej/vault-server:latest
# =============================================================================

name: Deploy Vault Server

# ── TRIGGER ──────────────────────────────────────────────────────────────────
# Runs only on push to main (not on PRs)
on:
  push:
    branches: [ main ]

jobs:
  # ── Wait for CI to pass first ──────────────────────────────────────────────
  # This ensures deploy only happens if the CI workflow succeeded
  deploy:
    name: "🚀 Build & Push Docker Image"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # Needed to push to GitHub Container Registry

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Login to GitHub's built-in container registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and tag the Docker image
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/vault-server:latest .
          docker tag ghcr.io/${{ github.repository_owner }}/vault-server:latest \
            ghcr.io/${{ github.repository_owner }}/vault-server:${{ github.sha }}

      # Push both the 'latest' and commit-SHA tagged images
      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/vault-server:latest
          docker push ghcr.io/${{ github.repository_owner }}/vault-server:${{ github.sha }}
